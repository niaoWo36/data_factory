<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据库迁移工具 · data_factory</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand fw-bold"><i class="bi bi-database-fill-gear me-2"></i>data_factory</span>
  <span class="text-secondary small">PostgreSQL 迁移 &amp; 导出工具</span>
</nav>

<!-- Step indicator -->
<div class="container-fluid bg-light border-bottom py-2">
  <div class="d-flex justify-content-center gap-0" id="stepNav">
    <button class="step-btn active" data-step="1"><span class="step-num">1</span> 连接配置</button>
    <button class="step-btn" data-step="2" disabled><span class="step-num">2</span> 选择租户</button>
    <button class="step-btn" data-step="3" disabled><span class="step-num">3</span> 迁移选项</button>
    <button class="step-btn" data-step="4" disabled><span class="step-num">4</span> 迁移进度</button>
    <button class="step-btn" data-step="5"><span class="step-num">5</span> SQL 导出</button>
  </div>
</div>

<div class="container py-4" style="max-width:960px">

  <!-- ═══════════ STEP 1 – Connection Config ═══════════ -->
  <div class="step-panel" id="step1">
    <h5 class="mb-3"><i class="bi bi-plug-fill me-2 text-primary"></i>数据库连接配置</h5>

    <!-- Same-DB toggle -->
    <div class="alert alert-info d-flex align-items-center gap-2 py-2" id="sameDBAuto" style="display:none!important">
      <i class="bi bi-info-circle-fill"></i>
      <span>已检测到源库与目标库为<strong>同一数据库实例</strong>，目标库仅需填写 Schema 名称。</span>
    </div>

    <div class="row g-3">
      <!-- Source Main -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header bg-primary text-white py-2">
            <i class="bi bi-server me-1"></i>源主数据库
          </div>
          <div class="card-body">
            <div id="srcMainForm"></div>
          </div>
        </div>
      </div>

      <!-- Source TS -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header bg-info text-dark py-2">
            <i class="bi bi-clock-history me-1"></i>源时序库（TimescaleDB）
          </div>
          <div class="card-body">
            <p class="text-muted small mb-2">与源主库同一服务器，仅 Schema 不同</p>
            <div id="srcTSForm"></div>
          </div>
        </div>
      </div>

      <!-- Dest Main -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header bg-success text-white py-2">
            <i class="bi bi-server me-1"></i>目标主数据库
          </div>
          <div class="card-body">
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" id="sameDbSwitch" />
              <label class="form-check-label" for="sameDbSwitch">与源库相同（跨 Schema 迁移）</label>
            </div>
            <div id="dstMainForm"></div>
          </div>
        </div>
      </div>

      <!-- Dest TS -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header bg-warning text-dark py-2">
            <i class="bi bi-clock-history me-1"></i>目标时序库（TimescaleDB）
          </div>
          <div class="card-body">
            <p class="text-muted small mb-2">与目标主库同一服务器，仅 Schema 不同</p>
            <div id="dstTSForm"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-outline-secondary" id="btnTestConn">
        <i class="bi bi-wifi me-1"></i>测试连接
      </button>
      <button class="btn btn-primary" id="btnSaveConfig">
        <i class="bi bi-check-circle me-1"></i>保存并继续
      </button>
    </div>
    <div id="connTestResult" class="mt-2"></div>
  </div>

  <!-- ═══════════ STEP 2 – Tenant Selection ═══════════ -->
  <div class="step-panel d-none" id="step2">
    <h5 class="mb-3"><i class="bi bi-people-fill me-2 text-primary"></i>选择租户</h5>
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="text-muted small">从源数据库 <code>sys_tenant</code> 表加载</span>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btnSelectAll">全选</button>
        <button class="btn btn-sm btn-outline-secondary" id="btnDeselectAll">取消全选</button>
        <button class="btn btn-sm btn-outline-primary" id="btnReloadTenants">
          <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
      </div>
    </div>
    <div id="tenantList" class="border rounded p-3 bg-white" style="max-height:320px;overflow-y:auto">
      <span class="text-muted">加载中…</span>
    </div>
    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-secondary" data-go-step="1">返回</button>
      <button class="btn btn-primary" id="btnTenantNext">下一步</button>
    </div>
  </div>

  <!-- ═══════════ STEP 3 – Migration Options ═══════════ -->
  <div class="step-panel d-none" id="step3">
    <h5 class="mb-3"><i class="bi bi-gear-fill me-2 text-primary"></i>迁移选项</h5>
    <div class="list-group">
      <label class="list-group-item list-group-item-action d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="checkbox" id="optSchema" checked />
        <span>
          <strong>复制表结构</strong>
          <span class="d-block text-muted small">将源库所有表的 DDL（CREATE TABLE、索引、外键）复制到目标库</span>
        </span>
      </label>
      <label class="list-group-item list-group-item-action d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="checkbox" id="optData" checked />
        <span>
          <strong>复制租户数据</strong>
          <span class="d-block text-muted small">按选定租户 ID 过滤，无租户字段的表全量复制</span>
        </span>
      </label>
      <label class="list-group-item list-group-item-action d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="checkbox" id="optTS" checked />
        <span>
          <strong>复制时序表结构（TimescaleDB）</strong>
          <span class="d-block text-muted small">根据 <code>thing_product.iot_table</code> 查找当前租户的时序表，只迁移表结构和 hypertable 定义，不复制时序数据</span>
        </span>
      </label>
    </div>
    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-secondary" data-go-step="2">返回</button>
      <button class="btn btn-primary" id="btnStartMigration">
        <i class="bi bi-play-fill me-1"></i>开始迁移
      </button>
    </div>
  </div>

  <!-- ═══════════ STEP 4 – Migration Progress ═══════════ -->
  <div class="step-panel d-none" id="step4">
    <h5 class="mb-3"><i class="bi bi-arrow-left-right me-2 text-primary"></i>迁移进度</h5>

    <div class="mb-3">
      <div class="d-flex justify-content-between small mb-1">
        <span id="progressLabel">准备中…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress" style="height:20px">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
             id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <div class="d-flex gap-2 mb-2">
      <span class="badge" id="badgeSchema">表结构</span>
      <span class="badge" id="badgeData">数据</span>
      <span class="badge" id="badgeTS">时序</span>
    </div>

    <!-- Log -->
    <div id="migrationLog" class="font-monospace small border rounded p-2 bg-dark text-success"
         style="height:340px;overflow-y:auto;white-space:pre-wrap"></div>

    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-secondary" id="btnStopMigration" style="display:none">
        <i class="bi bi-stop-fill me-1"></i>停止
      </button>
      <button class="btn btn-primary d-none" id="btnMigrationDone" data-go-step="5">
        完成，查看导出
      </button>
      <button class="btn btn-outline-secondary d-none" id="btnMigrationRetry" data-go-step="3">
        重新配置
      </button>
    </div>
  </div>

  <!-- ═══════════ STEP 5 – SQL Export ═══════════ -->
  <div class="step-panel d-none" id="step5">
    <h5 class="mb-3"><i class="bi bi-file-earmark-code-fill me-2 text-primary"></i>SQL 导出</h5>

    <div class="card mb-3">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">导出范围</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="expMain" checked />
            <label class="form-check-label" for="expMain">主数据库</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="expTS" checked />
            <label class="form-check-label" for="expTS">时序数据库</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">数据选项</label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="expDataOpt" id="expDDLOnly" value="ddl" checked />
            <label class="form-check-label" for="expDDLOnly">仅导出表结构（DDL only）</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="expDataOpt" id="expDDLData" value="ddl_data" />
            <label class="form-check-label" for="expDDLData">导出表结构 + 主库租户数据（时序仅导出表结构）</label>
          </div>
        </div>

        <div class="mb-3" id="expTenantSection">
          <label class="form-label fw-semibold">租户（仅导出数据时生效）</label>
          <div id="expTenantList" class="border rounded p-2" style="max-height:140px;overflow-y:auto">
            <span class="text-muted small">请先完成第2步租户选择</span>
          </div>
        </div>

        <button class="btn btn-success" id="btnExport">
          <i class="bi bi-download me-1"></i>生成并下载 SQL
        </button>
      </div>
    </div>

    <div id="exportResult"></div>
  </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/config.js"></script>
<script src="js/tenant.js"></script>
<script src="js/migrate.js"></script>
<script src="js/export.js"></script>
</body>
</html>
